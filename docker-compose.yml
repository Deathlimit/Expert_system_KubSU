services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=prikol2805
      - MONGO_INITDB_DATABASE=testing_expert
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - JWT_SECRET=testing-expert-system-jwt-secret-2026
      - MONGO_URI=mongodb://admin:prikol2805@mongodb:27017/testing_expert?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
