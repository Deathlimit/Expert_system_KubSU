  #   restart: unless-stopped
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     - MONGO_INITDB_ROOT_USERNAME=admin
  #     - MONGO_INITDB_ROOT_PASSWORD=admin123
  #     - MONGO_INITDB_DATABASE=testing_expert
  #   volumes:
  #     - mongo_data:/data/db
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  auth-service:
    build: ./auth_service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - JWT_SECRET=testing-expert-system-jwt-secret-2026
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/testing_expert?authSource=admin
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  content-service:
    build: ./content_service
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - JWT_SECRET=testing-expert-system-jwt-secret-2026
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/testing_expert?authSource=admin
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  test-service:
    build: ./test_service
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - JWT_SECRET=testing-expert-system-jwt-secret-2026
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/testing_expert?authSource=admin
      - CONTENT_SERVICE_URL=http://content-service:8002
    depends_on:
      content-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  session-service:
    build: ./session_service
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      - JWT_SECRET=testing-expert-system-jwt-secret-2026
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/testing_expert?authSource=admin
      - CONTENT_SERVICE_URL=http://content-service:8002
      - TEST_SERVICE_URL=http://test-service:8003
    depends_on:
      content-service:
        condition: service_healthy
      test-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
