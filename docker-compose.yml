services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=#
      - MONGO_INITDB_ROOT_PASSWORD=#
      - MONGO_INITDB_DATABASE=#
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - JWT_SECRET=#
      - MONGO_URI=#
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
